services:
  - type: web
    runtime: node
    name: iot-energy-monitor-api
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false

  - type: web
    runtime: static
    name: iot-energy-monitor-dashboard
    rootDir: UI
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: iot-energy-monitor-api
          envVarKey: RENDER_EXTERNAL_URL
