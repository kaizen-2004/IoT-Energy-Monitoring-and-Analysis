services:
  - type: web
    runtime: node
    name: iot-energy-monitor-api
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false

  - type: web
    runtime: static
    name: iot-energy-monitor-dashboard
    rootDir: dashboard
    buildCommand: |
      API_BASE_VALUE="${API_BASE:-http://localhost:8080}"
      case "$API_BASE_VALUE" in
        http://*|https://*) ;;
        *) API_BASE_VALUE="https://${API_BASE_VALUE}" ;;
      esac
      printf "window.APP_CONFIG = { API_BASE: '%s' };\n" "$API_BASE_VALUE" > config.js
    staticPublishPath: .
    autoDeployTrigger: commit
    envVars:
      - key: API_BASE
        fromService:
          type: web
          name: iot-energy-monitor-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
